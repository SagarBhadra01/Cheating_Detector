video:
  source: 0                   # 0 for default webcam
  resolution: [1280, 720]
  fps: 30
  recording_path: "./recordings"

screen:
  monitor_index: 0           # 0 for primary monitor
  fps: 15                    # Lower FPS for screen recording
  recording: true            # Enable/disable screen recording


detection:
  face:
    detection_interval: 5     # frames
    min_confidence: 0.8
  eyes:
    gaze_threshold: 2          # seconds
    blink_threshold: 0.3       # EAR threshold for blink detection
    gaze_sensitivity: 15       # pixels threshold for gaze detection
    consecutive_frames: 3      # frames for gaze change detection
  mouth:
    movement_threshold: 8     # consecutive frames (raised to prevent false positives)
  multi_face:
    alert_threshold: 5        # frames
  objects:
    min_confidence: 0.60  # Increased to prevent false positive phone detections
    detection_interval: 3 # frames between detections
    max_fps: 10           # Faster detection cycle
  audio_monitoring:
    enabled: true
    sample_rate: 16000
    energy_threshold: 0.03
    zcr_threshold: 0.35
    whisper_enabled: false  # Enable only when needed
    whisper_model: "tiny.en"
        
logging:
  log_path: "./logs"
  alert_cooldown: 5          # seconds (reduced for faster response)
  alert_system:
    voice_alerts: true  # Enable/disable voice alerts
    alert_volume: 0.8   # Volume level (0.0 to 1.0)
    cooldown: 10        # Minimum seconds between same alert


global:
  output_path: "./reports"

reporting:
  image_dir: "./reports/generated/images"  # New subdirectory for images
  output_dir: "./reports/generated"
  # Path to wkhtmltopdf binary (optional, the system will try common locations)
  # Windows: "C:/Program Files/wkhtmltopdf/bin/wkhtmltopdf.exe"
  # Linux/Mac: "/usr/local/bin/wkhtmltopdf" or set in PATH
  wkhtmltopdf_path: null 
  severity_levels:
    FACE_DISAPPEARED: 1
    GAZE_AWAY: 2
    MOUTH_MOVING: 3
    MULTIPLE_FACES: 4
    OBJECT_DETECTED: 5
    HAND_VIOLATION: 5
    AUDIO_DETECTED: 3